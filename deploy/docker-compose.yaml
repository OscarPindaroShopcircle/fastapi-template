services:
  db:
    image: postgres:18.3
    restart: always
    shm_size: 128mb
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${DATABASE__USER}
      APP_DB_PASSWORD: ${DATABASE__PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh:z
      - ./init_db.sql:/docker-entrypoint-init_db.sql:z

  adminer:
    image: adminer:5.4.2
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres_data:
